name: 多账号自动登录续期任务

on:
  schedule:
    # 每天 UTC 时间 00:00 运行（对应北京时间早上 8:00）
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许你在 GitHub 网页上手动点击按钮运行测试

jobs:
  run-script:
    runs-on: ubuntu-latest # 使用最新的 Ubuntu Linux 系统作为后台服务器
    timeout-minutes: 10
    
    steps:
      - name: 获取代码仓库
        uses: actions/checkout@v3

      - name: 配置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装 Python 依赖包
        # 把 pip 安装日志也藏起来放到 init_env.log 里
        run: |
          pip install seleniumbase ddddocr PyAutoGUI > init_env.log 2>&1

      - name: 🚀 智能解析节点并启动 Hysteria2
        env:
          proxy: ${{ secrets.PROXY }}
        run: |
          # 后台运行 Hysteria2 并将日志写入 hy2.log，这里不会产生乱糟糟的输出
          wget -q https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64
          chmod +x hysteria-linux-amd64
          
          AUTH=$(echo "$proxy" | sed -n 's|.*://\([^@]*\)@.*|\1|p')
          SERVER=$(echo "$proxy" | sed -n 's|.*@\([^/?#]*\).*|\1|p')
          SNI=$(echo "$proxy" | grep -oP 'sni=\K[^&#]*')
          
          cat <<EOF > hy2-config.yaml
          server: $SERVER
          auth: $AUTH
          tls:
            sni: $SNI
            insecure: true
          socks5:
            listen: 127.0.0.1:10808
          EOF
          
          nohup ./hysteria-linux-amd64 client -c hy2-config.yaml > hy2.log 2>&1 &
          sleep 3

      - name: 运行自动化脚本 (全局接管网络 + 虚拟屏幕)
        env:
          acount: ${{ secrets.ACOUNT }}
          HTTP_PROXY: socks5://127.0.0.1:10808
          HTTPS_PROXY: socks5://127.0.0.1:10808
          NO_PROXY: localhost,127.0.0.1,::1,github.com,github.io,googlechromelabs.github.io,googleapis.com
        run: |
          # 1. 代理测试：把大块的网络返回信息重定向到日志文件中
          curl -x socks5://127.0.0.1:10808 -I https://www.google.com --connect-timeout 10 >> init_env.log 2>&1 || echo "⚠️ 警告：代理连接测试失败！" >> init_env.log
          
          # 2. 安装环境：把 apt-get 长长的下载进度条全部静默，写进日志文件
          sudo apt-get update >> init_env.log 2>&1
          sudo apt-get install -y xvfb fonts-noto-cjk >> init_env.log 2>&1
          
          # 3. 这里是你在控制台唯一能看到的起始文字
          echo ">>> 🚀 开始执行自动登录 Python 脚本..."
          xvfb-run --server-args="-screen 0 1920x1080x24" python -u auto_login.py

      - name: 上传运行过程截图与日志文件
        uses: actions/upload-artifact@v4
        if: always() # 无论成功还是报错都执行
        with:
          name: Auto-Login-Results
          # 这里可以写多行，把文件夹和生成的日志文件一起打包下载
          path: |
            screenshots/
            init_env.log
            hy2.log
          retention-days: 7
